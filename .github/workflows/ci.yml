name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux-quality:
    name: format, lint, test, bench
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup component add rustfmt clippy
      - name: Run checks
        run: ./scripts/check
      - name: Run benchmarks
        run: ./scripts/bench

  msrv:
    name: minimum supported Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Install MSRV toolchain
        run: rustup toolchain install 1.90.0 --profile minimal
      - name: Check workspace with MSRV
        run: cargo +1.90.0 check --workspace --all-targets --all-features --locked

  supply-chain:
    name: audit and dependency policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal
      - name: Install cargo audit tools
        run: |
          cargo install cargo-audit --locked
          cargo install cargo-deny --locked
      - name: Check advisories
        run: cargo audit
      - name: Check dependency policy
        run: cargo deny check advisories bans licenses sources

  windows-quality:
    name: windows test and PowerShell syntax
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Install Rust toolchain
        shell: pwsh
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup component add rustfmt clippy
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Test
        run: cargo test --all-features
      - name: PowerShell syntax
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $null = [scriptblock]::Create((Get-Content -Raw install.ps1))
          $env:YURU_INSTALL_SCRIPT = (Resolve-Path install.ps1).Path
          powershell.exe -NoLogo -NoProfile -Command '$null = [scriptblock]::Create((Get-Content -Raw -LiteralPath $env:YURU_INSTALL_SCRIPT))'

          $script = (cargo run --quiet -p yuru -- --powershell) -join "`n"
          if (-not $script.Contains("--input")) {
            throw "PowerShell integration should pass candidates with --input"
          }
          if ($script.Contains('| & $yuru')) {
            throw "PowerShell integration should not pipe candidates into yuru"
          }
          $null = [scriptblock]::Create($script)
          $scriptPath = Join-Path $env:RUNNER_TEMP "yuru-powershell-integration.ps1"
          Set-Content -LiteralPath $scriptPath -Value $script
          $env:YURU_INTEGRATION_SCRIPT = $scriptPath
          powershell.exe -NoLogo -NoProfile -Command '$null = [scriptblock]::Create((Get-Content -Raw -LiteralPath $env:YURU_INTEGRATION_SCRIPT))'
