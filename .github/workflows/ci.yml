name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux-quality:
    name: format, lint, test, bench
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup component add rustfmt clippy
      - name: Run checks
        run: ./scripts/check
      - name: Run benchmarks
        run: ./scripts/bench

  windows-quality:
    name: windows test and PowerShell syntax
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        shell: pwsh
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup component add rustfmt clippy
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Test
        run: cargo test --all-features
      - name: PowerShell syntax
        shell: pwsh
        run: |
          $null = [scriptblock]::Create((Get-Content -Raw install.ps1))
          $script = ""
          cargo run --quiet -p yomi-cli -- --powershell |
            ForEach-Object { $script += "$_`n" }
          $null = [scriptblock]::Create($script)
