name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  validate:
    name: validate tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
      - name: Validate tag matches crate version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          version="$(python3 - <<'PY'
          import json
          import subprocess

          publishable = {"yuru", "yuru-core", "yuru-ja", "yuru-zh", "yuru-tui"}
          metadata = json.loads(
              subprocess.check_output(["cargo", "metadata", "--no-deps", "--format-version", "1"])
          )
          packages = {package["name"]: package for package in metadata["packages"]}

          missing = sorted(publishable - packages.keys())
          if missing:
              raise SystemExit(f"publishable package(s) missing from metadata: {', '.join(missing)}")

          versions = {packages[name]["version"] for name in publishable}
          if len(versions) != 1:
              details = ", ".join(f"{name}={packages[name]['version']}" for name in sorted(publishable))
              raise SystemExit(f"publishable package versions differ: {details}")

          version = versions.pop()
          expected_req = f"^{version}"
          for name in sorted(publishable):
              for dependency in packages[name]["dependencies"]:
                  if dependency["name"] in publishable and dependency["req"] != expected_req:
                      raise SystemExit(
                          f"{name} depends on {dependency['name']} with {dependency['req']}, "
                          f"expected {expected_req}"
                      )

          print(version)
          PY
          )"

          tag="${GITHUB_REF_NAME}"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tags must look like vX.Y.Z; got $tag" >&2
            exit 1
          fi
          if [ "$tag" != "v$version" ]; then
            echo "Release tag $tag does not match publishable crate version $version" >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"

  quality:
    name: format, lint, test, bench
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup component add rustfmt clippy
      - name: Run checks
        run: ./scripts/check
      - name: Run benchmarks
        run: ./scripts/bench

  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Install Rust toolchain
        shell: bash
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add "${{ matrix.target }}"
      - name: Build
        run: cargo build --release -p yuru --target "${{ matrix.target }}" --locked
      - name: Package Unix
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/yuru" yuru
          chmod 755 yuru
          tar -czf "dist/yuru-${{ matrix.target }}.tar.gz" yuru README.md
      - name: Package Windows
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/yuru.exe" "yuru.exe"
          Compress-Archive -Force -Path yuru.exe,README.md -DestinationPath "dist/yuru-${{ matrix.target }}.zip"
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: yuru-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  publish-crates:
    name: publish crates.io
    runs-on: ubuntu-latest
    needs: [validate, quality, build]
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      VERSION: ${{ needs.validate.outputs.version }}
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
      - name: Publish crates in dependency order
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${CARGO_REGISTRY_TOKEN:-}" ]; then
            echo "CARGO_REGISTRY_TOKEN secret is required to publish crates" >&2
            exit 1
          fi

          crate_exists() {
            curl -fsS "https://crates.io/api/v1/crates/$1/$VERSION" >/dev/null 2>&1
          }

          already_published() {
            grep -Eiq "already (uploaded|published|exists)|previously uploaded|crate version .* is already uploaded" "$1"
          }

          sleep_for_rate_limit() {
            retry_after="$(
              sed -nE 's/.*try again after (.*) and see .*/\1/p' "$1" | tail -n 1
            )"
            if [ -z "$retry_after" ]; then
              return 1
            fi

            retry_epoch="$(date -u -d "$retry_after" +%s 2>/dev/null || true)"
            if [ -z "$retry_epoch" ]; then
              return 1
            fi

            now_epoch="$(date -u +%s)"
            sleep_seconds="$((retry_epoch - now_epoch + 15))"
            if [ "$sleep_seconds" -lt 15 ]; then
              sleep_seconds=15
            fi

            echo "crates.io rate limit; sleeping ${sleep_seconds}s until after $retry_after"
            sleep "$sleep_seconds"
            return 0
          }

          publish_crate() {
            crate="$1"
            if crate_exists "$crate"; then
              echo "$crate $VERSION is already published; skipping"
              return 0
            fi

            for attempt in 1 2 3 4 5 6 7 8; do
              log_file="$(mktemp)"
              if cargo publish -p "$crate" --locked 2>&1 | tee "$log_file"; then
                rm -f "$log_file"
                return 0
              fi
              if already_published "$log_file" || crate_exists "$crate"; then
                echo "$crate $VERSION is already published; continuing"
                rm -f "$log_file"
                return 0
              fi
              if sleep_for_rate_limit "$log_file"; then
                rm -f "$log_file"
                continue
              fi
              rm -f "$log_file"
              if [ "$attempt" -eq 8 ]; then
                echo "failed to publish $crate after $attempt attempts" >&2
                return 1
              fi
              sleep "$((attempt * 20))"
            done
          }

          publish_crate yuru-core
          publish_crate yuru-ja
          publish_crate yuru-zh
          publish_crate yuru-tui
          publish_crate yuru

  crates-io-smoke:
    name: crates.io install smoke
    runs-on: ubuntu-latest
    needs: [validate, publish-crates]
    env:
      VERSION: ${{ needs.validate.outputs.version }}
    steps:
      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
      - name: Install yuru from crates.io
        shell: bash
        run: |
          set -euo pipefail
          cargo install yuru --version "$VERSION" --locked --root "$RUNNER_TEMP/yuru-crates"
          "$RUNNER_TEMP/yuru-crates/bin/yuru" --help
          printf 'tests/日本語.txt\nplan.md\n' |
            "$RUNNER_TEMP/yuru-crates/bin/yuru" --lang ja --filter ni |
            grep -F 'tests/日本語.txt'

  release:
    name: publish GitHub Release
    runs-on: ubuntu-latest
    needs: [validate, build, crates-io-smoke]
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/download-artifact@v8.0.1
        with:
          path: dist
          merge-multiple: true
      - name: Prepare checksums
        run: |
          cd dist
          sha256sum yuru-* > SHA256SUMS
      - name: Prepare release notes
        run: |
          tag="${{ github.ref_name }}"
          cat > RELEASE_NOTES.md <<EOF
          # Yuru ${tag}

          Install with the user-space installer:

          \`\`\`sh
          curl -fsSL https://raw.githubusercontent.com/Ameyanagi/yuru/main/install | sh -s -- --all
          \`\`\`

          \`\`\`powershell
          \$script = Invoke-RestMethod https://raw.githubusercontent.com/Ameyanagi/yuru/main/install.ps1
          Invoke-Expression "& { \$script } -All"
          \`\`\`

          Install from crates.io:

          \`\`\`sh
          cargo install yuru
          \`\`\`

          Release assets include macOS, Linux, and Windows binaries plus SHA256SUMS.
          EOF
      - name: Publish release
        run: |
          tag="${{ github.ref_name }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" dist/* --clobber
            gh release edit "$tag" --title "Yuru $tag" --notes-file RELEASE_NOTES.md --latest
          else
            gh release create "$tag" dist/* --title "Yuru $tag" --notes-file RELEASE_NOTES.md --latest
          fi

  install-smoke:
    name: install smoke ${{ matrix.name }}
    needs: release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            os: ubuntu-latest
            shell: bash
          - name: macos-x64
            os: macos-15-intel
            shell: bash
          - name: macos-arm64
            os: macos-14
            shell: bash
          - name: windows-x64
            os: windows-latest
            shell: pwsh
    env:
      RELEASE_TAG: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Install from release asset
        if: matrix.shell == 'bash'
        shell: bash
        run: |
          set -euxo pipefail
          bin_dir="$RUNNER_TEMP/yuru-bin"
          curl -fsSL "https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${GITHUB_SHA}/install" |
            sh -s -- --repo "$GITHUB_REPOSITORY" --version "$RELEASE_TAG" --bin-dir "$bin_dir" --no-shell --no-config
          "$bin_dir/yuru" --help
          printf 'tests/日本語.txt\nplan.md\n' |
            "$bin_dir/yuru" --lang ja --filter ni |
            grep -F 'tests/日本語.txt'
          "$bin_dir/yuru" --bash | bash -n
          if command -v zsh >/dev/null 2>&1; then
            "$bin_dir/yuru" --zsh | zsh -n
          fi
      - name: Install from release asset
        if: matrix.shell == 'pwsh'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $binDir = Join-Path $env:RUNNER_TEMP "yuru-bin"
          $script = Invoke-RestMethod "https://raw.githubusercontent.com/$env:GITHUB_REPOSITORY/$env:GITHUB_SHA/install.ps1"
          $installer = [scriptblock]::Create($script)
          & $installer -Repo $env:GITHUB_REPOSITORY -Version $env:RELEASE_TAG -BinDir $binDir -NoConfig
          $yuru = Join-Path $binDir "yuru.exe"
          & $yuru --help
          $matchOutput = "tests/日本語.txt`nplan.md`n" | & $yuru --lang ja --filter ni
          if (($matchOutput -join "`n") -notmatch [regex]::Escape("tests/日本語.txt")) {
            throw "expected Japanese filter smoke output to contain tests/日本語.txt"
          }
          $powershellIntegration = (& $yuru --powershell) -join "`n"
          $null = [scriptblock]::Create($powershellIntegration)
